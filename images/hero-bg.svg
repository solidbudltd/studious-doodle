<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="1440" height="900" fill="url(#skyGrad)"/>
  <!-- Moon / Sun glow -->
  <circle cx="1200" cy="120" r="60" fill="rgba(255,210,120,0.15)"/>
  <circle cx="1200" cy="120" r="40" fill="rgba(255,210,120,0.25)"/>
